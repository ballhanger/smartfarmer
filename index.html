<script>
        // ใส่ลิงก์ CSV ของคุณตรงนี้
        const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vR0SZMY4dcJHbXAFHOXFJmmFyewUDjWy2yFVKCkJqoG4Iz-kTa84-LpxORbOTJoDGWOkz2nPa1usyJ1/pub?gid=1908480955&single=true&output=csv"; 

        // 📌 กำหนดไตรมาสปัจจุบันที่นี่ (เปลี่ยนเป็น 1, 2, 3 หรือ 4 ตามช่วงเวลาจริง)
        const currentQuarter = 2;

        // ฟังก์ชันอ่าน CSV
        function fetchCSVData(url) {
            return new Promise((resolve, reject) => {
                Papa.parse(url, {
                    download: true,
                    header: true,
                    skipEmptyLines: true,
                    complete: function(results) { resolve(results.data); },
                    error: function(error) { reject(error); }
                });
            });
        }

        const formatNum = (num) => new Intl.NumberFormat('th-TH').format(num);

        const getStatusStyles = (status) => {
            if (!status) return "bg-slate-100 text-slate-600 border-slate-300";
            if (status.includes("เป็นไปตามแผน")) return "bg-green-100 text-green-800 border-green-300";
            if (status.includes("ล่าช้า")) return "bg-yellow-100 text-yellow-800 border-yellow-300 status-highlight";
            if (status.includes("เสี่ยง")) return "bg-red-100 text-red-800 border-red-300";
            if (status.includes("❌ ยังไม่ดำเนินการ")) return "bg-red-600 text-white border-red-800 shadow-md animate-pulse ring-2 ring-red-300 font-bold";
            return "bg-slate-100 text-slate-600 border-slate-300";
        };

        const issuesData = {
            projectOverview: "สืบเนื่องจากผลการดำเนินงานรวมของกิจกรรม KPI อยู่ในเกณฑ์ล่าช้า/เสี่ยง จึงต้องเร่งรัดการจัดกิจกรรมในพื้นที่",
            activityIssues: [
                { id: 1, text: "เกษตรกรกลุ่มเป้าหมายบางส่วนติดภารกิจ ทำให้การเข้าร่วมการอบรมไม่ครบตามจำนวนในบางรุ่น" },
                { id: 4, text: "การประสานงานรวบรวมกลุ่มเป้าหมายในบางจังหวัดมีความล่าช้า" },
                { id: 7, text: "อยู่ระหว่างการปรับปรุงหลักสูตรให้ครอบคลุมเทคโนโลยีการเกษตรสมัยใหม่" }
            ]
        };

        document.addEventListener('DOMContentLoaded', async () => {
            try {
                // 1. ดึงข้อมูลจาก Sheets
                const rawData = await fetchCSVData(CSV_URL);
                
                // 2. จัดรูปแบบข้อมูลรายกิจกรรม
                const activities = rawData.map((row, index) => {
                    const getCol = (key) => row[key] || row[key + " "] || "0";
                    return {
                        id: index + 1,
                        name: row["โครงการ/กิจกรรม"] || "-",
                        unit: row["หน่วยนับ"] || "-",
                        target: parseFloat(getCol("เป้าหมาย").replace(/,/g, '')),
                        actual: parseFloat(getCol("ผลการดำเนินงานสะสม").replace(/,/g, '')),
                        planQ1: parseFloat(getCol("แผนไตรมาส 1").replace(/,/g, '')),
                        actualQ1: parseFloat(getCol("ผลไตรมาส 1").replace(/,/g, '')),
                        planQ2: parseFloat(getCol("แผนไตรมาส 2").replace(/,/g, '')),
                        actualQ2: parseFloat(getCol("ผลไตรมาส 2").replace(/,/g, '')),
                        planQ3: parseFloat(getCol("แผนไตรมาส 3").replace(/,/g, '')),
                        planQ4: parseFloat(getCol("แผนไตรมาส 4").replace(/,/g, '')),
                        status: row["สถานะไตรมาส 2"] || row["สถานะไตรมาส 1"] || "❌ ยังไม่ดำเนินการ"
                    };
                }).filter(act => act.name !== "-" && !act.name.includes("โครงการพัฒนาทักษะ"));

                // ---------------------------------------------------------
                // 3. คำนวณภาพรวมโครงการจาก "กิจกรรมที่เป็น KPI เท่านั้น"
                // ---------------------------------------------------------
                const kpiActivities = activities.filter(act => act.name.includes("(KPI)"));

                const totalTarget = kpiActivities.reduce((sum, act) => sum + act.target, 0);
                const totalActual = kpiActivities.reduce((sum, act) => sum + act.actual, 0);
                const percentCum = totalTarget > 0 ? ((totalActual / totalTarget) * 100).toFixed(2) : "0.00";
                
                const planQ1 = kpiActivities.reduce((sum, act) => sum + act.planQ1, 0);
                const actualQ1 = kpiActivities.reduce((sum, act) => sum + act.actualQ1, 0);
                const planQ2 = kpiActivities.reduce((sum, act) => sum + act.planQ2, 0);
                const actualQ2 = kpiActivities.reduce((sum, act) => sum + act.actualQ2, 0);
                const planQ3 = kpiActivities.reduce((sum, act) => sum + act.planQ3, 0);
                const planQ4 = kpiActivities.reduce((sum, act) => sum + act.planQ4, 0);

                // 3.2 คำนวณสถานะโครงการล่าสุดตามเงื่อนไขเปอร์เซ็นต์
                let projectStatus = "❌ ยังไม่ดำเนินการ";
                const p = parseFloat(percentCum);

                if (p >= 100) {
                    projectStatus = "🟢 เป็นไปตามแผน";
                } else if (p >= 50.00 && p <= 99.99) {
                    projectStatus = "🟡 ล่าช้า";
                } else if (p >= 0.01 && p <= 49.99) {
                    projectStatus = "🔴 เสี่ยง";
                } else if (p === 0) {
                    // หาว่ามีแผนในไตรมาสปัจจุบันหรือที่ผ่านมาแล้วหรือยัง
                    let planUpToCurrent = 0;
                    if (currentQuarter >= 1) planUpToCurrent += planQ1;
                    if (currentQuarter >= 2) planUpToCurrent += planQ2;
                    if (currentQuarter >= 3) planUpToCurrent += planQ3;
                    if (currentQuarter >= 4) planUpToCurrent += planQ4;

                    if (planUpToCurrent > 0) {
                        projectStatus = "❌ ยังไม่ดำเนินการ";
                    } else {
                        // เช็กว่ามีแผนในอนาคตหรือไม่
                        if (currentQuarter === 1 && (planQ2 > 0 || planQ3 > 0 || planQ4 > 0)) projectStatus = "⚪ มีแผนอยู่ใน Q2/Q3/Q4";
                        else if (currentQuarter === 2 && (planQ3 > 0 || planQ4 > 0)) projectStatus = "⚪ มีแผนอยู่ใน Q3/Q4";
                        else if (currentQuarter === 3 && planQ4 > 0) projectStatus = "⚪ มีแผนอยู่ใน Q4";
                    }
                }

                const projectData = {
                    name: "โครงการพัฒนาทักษะและแนวคิดผู้ประกอบการธุรกิจเกษตร (เกษตรกรปราดเปรื่อง (Smart Farmer))",
                    target: totalTarget, 
                    actualCum: totalActual, 
                    percentCum: percentCum, 
                    statusQ2: projectStatus,
                    planQ1: planQ1,
                    actualQ1: actualQ1,
                    planQ2: planQ2,
                    actualQ2: actualQ2,
                    planQ3: planQ3,
                    planQ4: planQ4
                };

                // ---------------------------------------------------------
                // 4. แสดงผลข้อมูลลงใน HTML
                // ---------------------------------------------------------
                document.getElementById('project-name').textContent = projectData.name;
                
                document.getElementById('kpi-target').innerHTML = `${formatNum(projectData.target)} <span class="text-xl font-medium text-indigo-700/70">ราย</span>`;
                document.getElementById('kpi-actual').innerHTML = `${formatNum(projectData.actualCum)} <span class="text-xl font-medium text-emerald-700/70">ราย</span>`;
                
                const pieChart = document.getElementById('pie-chart');
                const piePercent = document.getElementById('pie-percent');
                piePercent.textContent = projectData.percentCum + '%';
                
                let pieColor = "#16a34a"; 
                if (projectData.statusQ2.includes("ล่าช้า")) pieColor = "#eab308"; 
                if (projectData.statusQ2.includes("เสี่ยง")) pieColor = "#ef4444"; 

                setTimeout(() => {
                    pieChart.style.background = `conic-gradient(${pieColor} 0% ${projectData.percentCum}%, #f1f5f9 ${projectData.percentCum}% 100%)`;
                }, 100);

                const statusEl = document.getElementById('project-status');
                statusEl.textContent = projectData.statusQ2;
                statusEl.className = `inline-flex items-center justify-center px-8 py-4 rounded-2xl text-2xl font-bold border-2 shadow-sm w-full sm:w-auto bg-white ${getStatusStyles(projectData.statusQ2)}`;

                // กราฟแท่งรายไตรมาส (คำนวณจาก KPI เท่านั้น)
                const qData = [
                    { name: 'ไตรมาส 1', plan: projectData.planQ1, actual: projectData.actualQ1, showActual: true, actualColor: 'bg-[#0ea5e9]' },
                    { name: 'ไตรมาส 2', plan: projectData.planQ1 + projectData.planQ2, actual: projectData.actualQ1 + projectData.actualQ2, showActual: true, actualColor: 'bg-[#16a34a]' },
                    { name: 'ไตรมาส 3', plan: projectData.planQ1 + projectData.planQ2 + projectData.planQ3, actual: 0, showActual: false, actualColor: '' },
                    { name: 'ไตรมาส 4', plan: projectData.planQ1 + projectData.planQ2 + projectData.planQ3 + projectData.planQ4, actual: 0, showActual: false, actualColor: '' }
                ];
                
                const maxVal = Math.max(...qData.map(d => d.plan)) * 1.25 || 1; 

                const barContainer = document.getElementById('bar-chart-container');
                barContainer.innerHTML = '';
                qData.forEach(q => {
                    const planHeight = (q.plan / maxVal) * 100;
                    const actualHeight = q.showActual ? (q.actual / maxVal) * 100 : 0;
                    
                    const actualBarHtml = q.showActual ? `
                        <div class="flex flex-col items-center justify-end h-full">
                            <span class="text-xs sm:text-sm font-bold text-orange-900 mb-1 absolute bottom-full pb-1 opacity-0 transition-opacity duration-700 delay-300" style="bottom: ${actualHeight}%">${formatNum(q.actual)}</span>
                            <div class="w-6 sm:w-10 md:w-16 ${q.actualColor} rounded-t-md bar-chart-col shadow-sm" style="height: 0%" data-h="${actualHeight}"></div>
                        </div>
                    ` : `<div class="w-6 sm:w-10 md:w-16 bg-transparent"></div>`;

                    barContainer.innerHTML += `
                        <div class="flex flex-col items-center w-1/4 h-full justify-end">
                            <div class="flex items-end space-x-1 sm:space-x-2 h-full w-full justify-center relative pb-0">
                                <div class="flex flex-col items-center justify-end h-full">
                                    <span class="text-xs sm:text-sm font-bold text-orange-600 mb-1 absolute bottom-full pb-1 opacity-0 transition-opacity duration-700 delay-300" style="bottom: ${planHeight}%">${formatNum(q.plan)}</span>
                                    <div class="w-6 sm:w-10 md:w-16 bg-orange-200 border border-orange-300 rounded-t-md bar-chart-col" style="height: 0%" data-h="${planHeight}"></div>
                                </div>
                                ${actualBarHtml}
                            </div>
                            <div class="mt-3 text-sm font-bold text-orange-950">${q.name}</div>
                        </div>
                    `;
                });

                setTimeout(() => {
                    document.querySelectorAll('.bar-chart-col').forEach(bar => {
                        bar.style.height = bar.getAttribute('data-h') + '%';
                    });
                    document.querySelectorAll('.opacity-0').forEach(text => { text.classList.remove('opacity-0'); });
                }, 100);

                // สรุปการ์ดนับจำนวนกิจกรรมทั้งหมด (อิงตามสถานะของแต่ละกิจกรรม ไม่ได้กรองแค่ KPI)
                const summary = {
                    total: activities.length,
                    onTrack: activities.filter(a => a.status.includes("เป็นไปตามแผน")).length,
                    delayed: activities.filter(a => a.status.includes("ล่าช้า")).length,
                    atRisk: activities.filter(a => a.status.includes("เสี่ยง")).length,
                    notStartedSevere: activities.filter(a => a.status.includes("❌ ยังไม่ดำเนินการ")).length,
                    notStarted: activities.filter(a => a.status.includes("มีแผนอยู่ใน")).length,
                };

                document.getElementById('summary-cards').innerHTML = `
                    <div class="col-span-2 md:col-span-1 bg-white rounded-xl p-4 text-center border-2 border-slate-200 shadow-sm">
                        <p class="text-sm font-bold text-slate-500 mb-1">กิจกรรมทั้งหมด</p>
                        <p class="text-4xl font-extrabold text-slate-800">${summary.total}</p>
                    </div>
                    <div class="bg-white rounded-xl p-4 border-2 border-green-200 text-center shadow-sm">
                        <p class="text-sm font-bold text-green-700 mb-1">เป็นไปตามแผน</p>
                        <p class="text-4xl font-extrabold text-green-700">${summary.onTrack}</p>
                    </div>
                    <div class="bg-white rounded-xl p-4 border-2 border-yellow-300 text-center shadow-sm">
                        <p class="text-sm font-bold text-yellow-600 mb-1">ล่าช้า</p>
                        <p class="text-4xl font-extrabold text-yellow-600">${summary.delayed}</p>
                    </div>
                    <div class="bg-white rounded-xl p-4 border-2 border-red-200 text-center shadow-sm">
                        <p class="text-sm font-bold text-red-600 mb-1">เสี่ยง</p>
                        <p class="text-4xl font-extrabold text-red-600">${summary.atRisk}</p>
                    </div>
                    <div class="bg-white rounded-xl p-4 border-2 border-red-400 text-center shadow-sm relative overflow-hidden">
                        <div class="absolute inset-0 bg-red-50 opacity-50 animate-pulse"></div>
                        <p class="text-sm font-bold text-red-700 mb-1 relative z-10">ยังไม่ดำเนินการ</p>
                        <p class="text-4xl font-extrabold text-red-700 relative z-10">${summary.notStartedSevere}</p>
                    </div>
                    <div class="col-span-2 md:col-span-1 bg-white rounded-xl p-4 text-center border-2 border-slate-200 border-dashed shadow-sm">
                        <p class="text-sm font-bold text-slate-400 mb-1">มีแผนในไตรมาสถัดไป</p>
                        <p class="text-4xl font-extrabold text-slate-400">${summary.notStarted}</p>
                    </div>
                `;

                // ตารางติดตามสถานะรายกิจกรรม
                const tbody = document.getElementById('table-body');
                tbody.innerHTML = '';
                activities.forEach(act => {
                    const safeTarget = act.target > 0 ? act.target : 1;
                    const pct = (act.actual / safeTarget) * 100;
                    const q1Pos = Math.min((act.planQ1 / safeTarget) * 100, 100);
                    const q2Pos = Math.min(((act.planQ1 + act.planQ2) / safeTarget) * 100, 100);
                    const q3Pos = Math.min(((act.planQ1 + act.planQ2 + act.planQ3) / safeTarget) * 100, 100);

                    let barColor = "bg-slate-300"; 
                    if (act.status.includes("เป็นไปตามแผน")) barColor = "bg-[#16a34a]"; 
                    if (act.status.includes("ล่าช้า")) barColor = "bg-yellow-400"; 
                    if (act.status.includes("เสี่ยง")) barColor = "bg-red-500"; 
                    if (act.status.includes("❌ ยังไม่ดำเนินการ")) barColor = "bg-red-600"; 

                    let markersHtml = '';
                    if(q1Pos > 0) markersHtml += `<div class="absolute top-[16px] z-10 flex flex-col items-center -translate-x-1/2" style="left: ${q1Pos}%"><div class="h-3 w-px bg-cyan-600/50"></div><span class="text-[10px] font-bold text-cyan-800 mt-0.5 bg-white px-1 border border-cyan-200 rounded">Q1</span></div>`;
                    if(q2Pos > q1Pos) markersHtml += `<div class="absolute top-[16px] z-10 flex flex-col items-center -translate-x-1/2" style="left: ${q2Pos}%"><div class="h-3 w-px bg-cyan-600/50"></div><span class="text-[10px] font-bold text-cyan-800 mt-0.5 bg-white px-1 border border-cyan-200 rounded">Q2</span></div>`;
                    if(q3Pos > q2Pos) markersHtml += `<div class="absolute top-[16px] z-10 flex flex-col items-center -translate-x-1/2" style="left: ${q3Pos}%"><div class="h-3 w-px bg-cyan-600/50"></div><span class="text-[10px] font-bold text-cyan-800 mt-0.5 bg-white px-1 border border-cyan-200 rounded">Q3</span></div>`;

                    const progressHtml = `
                        <div class="w-full relative mt-6 mb-8">
                            <div class="absolute -top-6 -translate-x-1/2 z-20 bar-chart-col-text flex flex-col items-center" style="left: 0%" data-left="${Math.min(pct, 100)}">
                                <div class="bg-cyan-900 text-white px-1.5 py-0.5 rounded text-[11px] font-bold whitespace-nowrap shadow-sm">${pct.toFixed(2)}%</div>
                                <div class="w-0.5 h-1.5 bg-cyan-900"></div>
                            </div>
                            <div class="h-4 bg-cyan-100 rounded-full relative overflow-hidden border border-cyan-200">
                                <div class="h-full ${barColor} bar-chart-col" style="width: 0%" data-h="${Math.min(pct, 100)}"></div>
                            </div>
                            ${markersHtml}
                        </div>
                    `;

                    const isKPI = act.name.includes("(KPI)");
                    const displayName = act.name.replace("(KPI)", '<span class="inline-flex items-center px-2 py-0.5 rounded text-xs font-bold bg-blue-100 text-blue-800 mr-1 border border-blue-200 shadow-sm">(KPI)</span>');
                    const nameStyle = isKPI ? "text-cyan-950 font-bold" : "text-cyan-900 font-medium";

                    tbody.innerHTML += `
                        <tr class="border-b border-cyan-100 hover:bg-cyan-100/40 transition-colors">
                            <td class="px-6 py-4"><div class="leading-relaxed ${nameStyle}">${displayName}</div></td>
                            <td class="px-4 py-4 text-center text-cyan-800 font-medium">${act.unit}</td>
                            <td class="px-4 py-4 text-right font-bold text-cyan-900">${formatNum(act.target)}</td>
                            <td class="px-4 py-4 text-right font-bold text-blue-700">${formatNum(act.actual)}</td>
                            <td class="px-6 py-4">${progressHtml}</td>
                            <td class="px-6 py-4 text-center">
                                <span class="inline-flex items-center px-3 py-1.5 rounded-full text-xs font-bold border whitespace-nowrap shadow-sm ${getStatusStyles(act.status)}">${act.status}</span>
                            </td>
                        </tr>
                    `;
                });

                setTimeout(() => {
                    document.querySelectorAll('#table-body .bar-chart-col').forEach(bar => {
                        bar.style.width = bar.getAttribute('data-h') + '%';
                    });
                    document.querySelectorAll('#table-body .bar-chart-col-text').forEach(textEl => {
                        textEl.style.left = textEl.getAttribute('data-left') + '%';
                    });
                }, 100);

                // ปัญหาและอุปสรรค
                let issuesHtml = '';
                if (projectData.statusQ2.includes("ล่าช้า") || projectData.statusQ2.includes("เสี่ยง")) {
                    issuesHtml += `
                        <div class="bg-white border-l-4 border-red-500 p-5 rounded-r-xl shadow-sm">
                            <h4 class="font-bold text-red-800 mb-2 flex items-center">ภาพรวมโครงการ (สถานะ ${projectData.statusQ2})</h4>
                            <p class="text-sm text-red-700 leading-relaxed">${issuesData.projectOverview}</p>
                        </div>
                    `;
                }

                const problematicActivities = activities.filter(a => a.status.includes("ล่าช้า") || a.status.includes("เสี่ยง") || a.status.includes("❌ ยังไม่ดำเนินการ"));
                if (problematicActivities.length > 0) {
                    issuesHtml += `<h4 class="font-bold text-rose-950 mt-6 mb-3 text-base">รายกิจกรรม</h4><div class="grid grid-cols-1 md:grid-cols-2 gap-4">`;
                    problematicActivities.forEach(act => {
                        const issueMatch = issuesData.activityIssues.find(i => i.id === act.id);
                        const issueText = issueMatch ? issueMatch.text : "อยู่ระหว่างตรวจสอบและรวบรวมสาเหตุการดำเนินงาน";
                        
                        let statusColor = "text-slate-600 bg-slate-50 border-slate-200";
                        if (act.status.includes("เสี่ยง")) statusColor = "text-red-700 bg-red-50 border-red-200";
                        else if (act.status.includes("ล่าช้า")) statusColor = "text-yellow-700 bg-yellow-50 border-yellow-200";
                        else if (act.status.includes("❌ ยังไม่ดำเนินการ")) statusColor = "text-white bg-red-600 border-red-800 shadow-sm animate-pulse";
                        
                        const displayName = act.name.replace("(KPI)", '<span class="inline-flex items-center px-2 py-0.5 rounded text-[10px] font-bold bg-blue-100 text-blue-800 mr-1">(KPI)</span>');

                        issuesHtml += `
                            <div class="border border-rose-200 rounded-xl p-4 bg-white flex flex-col hover:shadow-md transition-shadow">
                                <div class="mb-3"><span class="text-xs font-bold px-2.5 py-1 rounded-full border ${statusColor}">${act.status}</span></div>
                                <h5 class="text-sm font-bold text-rose-950 mb-3 leading-relaxed">${displayName}</h5>
                                <div class="bg-rose-50/50 p-3 rounded-lg border border-rose-100 flex-grow">
                                    <p class="text-sm text-rose-900 leading-relaxed"><span class="font-semibold text-rose-950">สาเหตุ:</span> ${issueText}</p>
                                </div>
                            </div>
                        `;
                    });
                    issuesHtml += `</div>`;
                } else {
                    issuesHtml = `<div class="bg-white p-6 rounded-xl border border-rose-100 text-center text-rose-500 font-medium shadow-sm">ไม่พบปัญหาหรือความเสี่ยงในการดำเนินงาน ณ ปัจจุบัน ทุกกิจกรรมดำเนินการได้ตามแผน</div>`;
                }

                document.getElementById('issues-container').innerHTML = issuesHtml;

            } catch (error) {
                console.error("Error loading CSV:", error);
                document.getElementById('project-name').textContent = "เกิดข้อผิดพลาดในการโหลดข้อมูล";
                alert("ไม่สามารถดึงข้อมูลจาก Google Sheets ได้ กรุณาตรวจสอบลิงก์ หรือสถานะการเผยแพร่ไฟล์อีกครั้ง");
            }
        });
    </script>
